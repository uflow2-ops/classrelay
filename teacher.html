<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 대시보드 - 텔레스트레이션 클라스</title>
    <style>
        body { 
            font-family: '맑은 고딕', sans-serif; 
            background-color: #f4f4f9; 
            padding: 20px; 
            margin: 0;
        }
        h1, h2 { text-align: center; color: #333; }
        
        /* 상단 컨트롤 패널 */
        .dashboard-controls { text-align: center; margin: 20px 0; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-start { padding: 15px 25px; font-size: 18px; background: #2ecc71; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-result { padding: 15px 25px; font-size: 18px; background: #9b59b6; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-reset { padding: 15px 25px; font-size: 18px; background: #e74c3c; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 5px; } /* 🧹 초기화 버튼 스타일 추가 */
        
        /* 대기실 (학생 목록) */
        .student-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .student-card { background: white; padding: 20px; border-radius: 10px; text-align: center; font-size: 20px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 8px solid #4a90e2; }
        
        /* 결과 확인 카드 디자인 초대형화 */
        #results-view { max-width: 95% !important; margin: 0 auto; }
        .result-card { 
            background: white; 
            margin-bottom: 40px; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            border: 2px solid #eef2f7;
        }
        .result-header { 
            font-size: 2em !important; /* 팀 제목 크기 두 배로 변경 */
            font-weight: bold;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        /* 릴레이 흐름 박스 크기 및 배치 최적화 */
        .relay-flow { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 20px; 
            padding-bottom: 20px; 
        }
        .step-box { 
            flex: 1 1 calc(25% - 20px); 
            min-width: 260px; 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 15px; 
            border: 2px solid #e9ecef;
            display: flex;
            flex-direction: column;
        }
        /* 추측 텍스트는 위쪽으로 작게 배치 */
        .step-content-small { 
            font-size: 1.3em !important; 
            font-weight: 700; 
            color: #2c3e50; 
            background: #eef2f7;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 5px 0 10px 0;
            text-align: center;
        }
        .step-box img { 
            width: 100%; 
            max-height: 250px; 
            object-fit: contain; 
            border-radius: 10px; 
            border: 1px solid #ced4da; 
            cursor: zoom-in; /* 마우스를 올리면 돋보기 모양으로 변경 */
            transition: transform 0.2s ease;
        }
        .step-box img:hover {
            transform: scale(1.02); /* 살짝 커지는 시각 효과 */
        }
        .step-title { font-size: 1em !important; color: #495057; font-weight: bold; }
        .step-content-large { font-size: 2em !important; font-weight: 800; color: #e74c3c; text-align: center; margin-top: 10px; }

        /* 최종 정답 가리기 및 버튼 스타일 */
        .secret-guess {
            filter: blur(8px);
            transition: filter 0.3s ease;
            user-select: none;
        }
        .secret-guess.revealed {
            filter: blur(0);
            user-select: auto;
        }

        /* 💡 [수정] 정답 확인 버튼 - 반짝이는 그라데이션 및 Shimmer 애니메이션 스타일 */
        .btn-reveal {
            position: relative;
            overflow: hidden; /* 반짝이는 빛이 버튼 밖으로 나가지 않도록 설정 */
            background: linear-gradient(135deg, #34495e, #2c3e50, #8e44ad, #34495e);
            background-size: 300% 300%; /* 그라데이션 이동을 위한 배경 확대 */
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            
            /* 은은하게 색상이 변하는 애니메이션 구동 */
            animation: gradientShift 4s ease infinite;
        }

        /* 마우스를 올리거나 TV 앞에서 포커스될 때 반응 */
        .btn-reveal:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(142, 68, 173, 0.4);
        }

        /* 💡 흰색 빛줄기가 대각선으로 빠르게 번쩍이며 지나가는 효과 제거/추가용 가상 요소 */
        .btn-reveal::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 30%;
            height: 200%;
            background: linear-gradient(
                to right, 
                rgba(255, 255, 255, 0) 0%, 
                rgba(255, 255, 255, 0.6) 50%, 
                rgba(255, 255, 255, 0) 100%
            );
            transform: rotate(30deg);
            /* 1.5초 간격으로 무한히 반짝이는 빛줄기 이동 */
            animation: shimmerEffect 1.5s infinite ease-in-out;
        }

        /* 1. 배경 그라데이션 색상 전환 키프레임 */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 2. 대각선 빛 번쩍임 키프레임 */
        @keyframes shimmerEffect {
            0% { left: -60%; }
            100% { left: 140%; }
        }

        /* 채점 버튼 영역 대형화 */
        .action-buttons { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 2px dashed #dee2e6; }
        .action-buttons span { font-size: 1.8em; display: block; margin-bottom: 15px; }
        .btn-correct { background: #2ecc71; color: white; padding: 15px 40px; border: none; border-radius: 10px; font-size: 24px; cursor: pointer; font-weight: bold; margin-right: 20px; }
        .btn-wrong { background: #e74c3c; color: white; padding: 15px 40px; border: none; border-radius: 10px; font-size: 24px; cursor: pointer; font-weight: bold; }

        /* 💡 [추가] 그림 클릭 유도 및 대형 팝업 모달 스타일 */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 9999; /* 최상단 배치 */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85); /* 어두운 반투명 배경 */
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }

        /* 모달 내부 초대형 이미지 */
        .image-modal-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 5px solid white;
            border-radius: 15px;
            background-color: white;
            animation: zoomEffect 0.2s ease-out;
        }

        @keyframes zoomEffect {
            from { transform: scale(0.7); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 💡 [추가] 그림 클릭 시 확대 모달 -->
    <div id="picture-modal" class="image-modal" onclick="closeImageModal()">
        <img id="modal-target-img" class="image-modal-content" src="">
    </div>

    <div id="password-screen" style="max-width: 400px; margin: 100px auto; padding: 40px; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; color: #333;">🔒 교사 인증</h2>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">비밀번호를 입력하세요</p>
        <input type="password" id="password-input" placeholder="비밀번호" style="width: 100%; padding: 15px; font-size: 18px; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box;">
        <button onclick="checkPassword()" style="width: 100%; padding: 15px; font-size: 18px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">입장</button>
    </div>

    <div id="dashboard-content" style="display: none;">
    <h1>👨‍🏫 교실 라이브 현황판</h1>
    
        <div class="dashboard-controls">
            <!-- 💡 [추가] 현재 라운드를 알려주는 대형 텍스트 안내판 -->
            <h1 id="round-display" style="font-size: 2.5em; color: #3498db; margin-bottom: 10px;">🎮 제 1라운드 진행 중</h1>
            
            <!-- 💡 [수정] 이번 라운드 제시어 세트 입력창 (추천 버튼 포함) -->
            <div id="topic-management-box" style="margin: 15px auto; padding: 20px; max-width: 800px; background: #eef2f7; border-radius: 10px; text-align: left;">
                <label style="font-weight: bold; color: #2c3e50; display: block; margin-bottom: 10px;">🌟 주제별 추천 단어 세트 (클릭 시 자동 입력)</label>
                
                <!-- 💡 [추가] 원클릭 카테고리 변경 버튼 영역 -->
                <div style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <button type="button" onclick="window.applyPresetTopic('animal')" style="background: #ff7675; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">🦁 동물</button>
                    <button type="button" onclick="window.applyPresetTopic('food')" style="background: #fab1a0; color: #2c3e50; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">🍕 음식</button>
                    <button type="button" onclick="window.applyPresetTopic('sports')" style="background: #74b9ff; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">⚽ 스포츠</button>
                    <button type="button" onclick="window.applyPresetTopic('object')" style="background: #a29bfe; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">🎒 물건</button>
                    <button type="button" onclick="window.applyPresetTopic('default')" style="background: #636e72; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer;">🔄 기본값</button>
                </div>

                <label for="custom-topics-input" style="font-weight: bold; color: #2c3e50; display: block; margin-bottom: 8px;">📝 이번 라운드 제시어 세트 (쉼표로 구분하여 입력)</label>
                <textarea id="custom-topics-input" style="width: 100%; height: 60px; padding: 10px; font-size: 15px; border: 2px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; resize: none;"></textarea>
                <p style="margin: 5px 0 0 0; font-size: 13px; color: #64748b;">* 비어있을 경우 아래 입력된 단어들 중 무작위 배정되며, 언제든 직접 타이핑하여 수정 가능합니다.</p>
            </div>
            
            <h2 id="student-count" style="margin-top:0;">현재 대기 중인 접속자: 0명</h2>
            <button class="btn-start" onclick="startGame()">🚀 1. 릴레이 게임 시작하기</button>
            <button class="btn-start" onclick="restartGame()" style="background: #3498db;">🔄 1.5 다음 판 연속 시작하기</button>
            <button class="btn-result" onclick="showResults()">🏁 2. 결과 확인 및 채점하기</button>
            <!-- 🧹 대기실 초기화 버튼 추가 -->
            <button class="btn-reset" onclick="resetWaitingRoom()">🧹 3. 대기실 유령 초기화</button>
        </div>

    <!-- 1. 대기실 화면 -->
    <div class="student-grid" id="student-list"></div>

    <!-- 2. 결과 화면 -->
    <div id="results-view"></div>

    <!-- 파이어베이스 설정 파일 로드 -->
    <script type="module">
        import { initializeFirebase } from './firebase-config.js';
        // 맨 끝에 deleteDoc 추가
        import { collection, onSnapshot, getDocs, writeBatch, doc, updateDoc, deleteDoc, setDoc, getDoc, increment } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const { app, db } = await initializeFirebase();

        let activeUsersData = []; 
        let currentRoundCount = 1; // 💡 [추가] 현재 라운드 번호를 저장하는 변수 (기본값 1)

        // 💡 [수정] 기본 제시어 배열
        const defaultTopics = [ "사과", "달", "기차", "강아지", "우산", "비행기", "나무", "눈사람", "로봇", "케이크", "축구공", "고양이", "자동차", "선글라스", "나비" ];

        // 💡 [추가] 주제별 추천 단어 프리셋 데이터 딕셔너리
        const topicPresets = {
            animal: ["사자", "호랑이", "토끼", "원숭이", "기린", "코끼리", "판다", "펭귄", "개구리", "햄스터", "다람쥐", "돌고래"],
            food: ["피자", "치킨", "햄버거", "아이스크림", "떡볶이", "김밥", "수박", "바나나", "포도", "도넛", "스파게티", "짜장면"],
            sports: ["축구", "야구", "농구", "수영", "태권도", "스케이트", "줄넘기", "볼링", "테니스", "골프", "달리기", "피구"],
            object: ["가방", "필통", "연필", "스마트폰", "시계", "안경", "자전거", "텔레비전", "선풍기", "우산", "신발", "모자"],
            default: [ "사과", "달", "기차", "강아지", "우산", "비행기", "나무", "눈사람", "로봇", "케이크", "축구공", "고양이", "자동차", "선글라스", "나비" ]
        };

        // 페이지 로드 시 textarea에 기본 제시어를 채워넣어 편집을 돕습니다.
        document.addEventListener('DOMContentLoaded', () => {
            const topicInput = document.getElementById('custom-topics-input');
            if (topicInput) {
                topicInput.value = defaultTopics.join(', ');
            }
        });

        // 💡 현재 입력창의 단어 배열을 안전하게 파싱하여 가져오는 헬퍼 함수
        function getSelectedTopics() {
            const inputVal = document.getElementById('custom-topics-input').value;
            if (!inputVal.trim()) return defaultTopics;
            
            // 쉼표로 분리 후 앞뒤 공백 제거, 빈 단어는 필터링
            const parsed = inputVal.split(',').map(t => t.trim()).filter(t => t.length > 0);
            return parsed.length > 0 ? parsed : defaultTopics;
        }

        // 💡 [추가] 버튼 클릭 시 입력창(textarea)의 텍스트를 변경하는 매핑 함수
        window.applyPresetTopic = (category) => {
            const topicInput = document.getElementById('custom-topics-input');
            if (topicInput && topicPresets[category]) {
                // 배열 요소를 쉼표와 공백으로 연결하여 문자열로 치환
                topicInput.value = topicPresets[category].join(', ');
            }
        };

        // [1] 대기실 실시간 감시
        console.log("🔍 대기실 감시 시작...");
        onSnapshot(collection(db, "active_users"), (snapshot) => {
            console.log("📊 대기실 데이터 업데이트:", snapshot.size, "개 문서");
            document.getElementById('student-list').innerHTML = '';
            activeUsersData = []; 
            let count = 0;
            
            snapshot.forEach((doc) => {
                const student = doc.data();
                console.log("학생 데이터:", student);
                activeUsersData.push({ id: doc.id, ...student });
                
                if(student.status === "waiting") {
                    document.getElementById('student-list').innerHTML += `<div class="student-card">${student.name}</div>`;
                    count++;
                }
            });
            
            document.getElementById('student-count').innerText = `현재 대기 중인 접속자: ${count}명`;
            console.log("대기자 수:", count);
        }, (error) => {
            console.error("❌ 대기실 감시 오류:", error);
        });

        // 🧹 [수정] 전체 초기화 (대기실 + 릴레이 기록 + 개인 점수 모두 삭제) - Firestore v9 Modular SDK 호환
        window.resetWaitingRoom = async () => {
            if(!confirm("⚠️ 접속 기록, 게임 데이터, 누적 개인 점수를 모두 삭제하고 초기화하시겠습니까?")) return;

            try {
                // 💡 Firestore v9 필수 함수들을 안전하게 추가 임포트합니다.
                const { collection, getDocs, doc, writeBatch } = await import("https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js");
                
                // 싱글 배치(Batch) 객체 생성
                const batch = writeBatch(db);
                let deleteCount = 0;

                // 1. active_users (활성 사용자) 컬렉션 전체 삭제 준비
                const usersSnapshot = await getDocs(collection(db, "active_users"));
                usersSnapshot.forEach(docSnap => {
                    batch.delete(doc(db, "active_users", docSnap.id));
                    deleteCount++;
                });
                
                // 2. relays (릴레이 게임 기록) 컬렉션 전체 삭제 준비
                const relaysSnapshot = await getDocs(collection(db, "relays"));
                relaysSnapshot.forEach(docSnap => {
                    batch.delete(doc(db, "relays", docSnap.id));
                    deleteCount++;
                });
                
                // 3. user_scores (개인 누적 점수) 컬렉션 전체 삭제 준비
                const scoresSnapshot = await getDocs(collection(db, "user_scores"));
                scoresSnapshot.forEach(docSnap => {
                    batch.delete(doc(db, "user_scores", docSnap.id));
                    deleteCount++;
                });

                // 💡 삭제할 데이터가 있을 때만 커밋을 수행합니다 (빈 배치 커밋 에러 방지)
                if (deleteCount > 0) {
                    await batch.commit();
                }
                
                // 4. 교사 화면 UI 상태 초기화
                currentRoundCount = 1;
                const roundDisp = document.getElementById('round-display');
                if (roundDisp) {
                    roundDisp.innerText = '🎮 제 1라운드 진행 중';
                }
                
                // 결과 확인창도 비우기
                const resView = document.getElementById('results-view');
                if (resView) {
                    resView.innerHTML = '';
                    resView.style.display = 'none';
                }
                
                const studList = document.getElementById('student-list');
                if (studList) {
                    studList.style.display = 'grid';
                }

                alert("✅ 모든 유령 회원 정보와 게임 데이터가 성공적으로 초기화되었습니다!");
            } catch (e) {
                console.error("초기화 실행 중 상세 에러 발생:", e);
                alert("초기화 중 오류가 발생했습니다. 개발자 도구(F12) 콘솔 창의 에러 로그를 확인해 주세요.");
            }
        };

        // [2] 게임 시작 로직 (라운드 로빈 방식 - 모든 학생이 각 역할을 한 번씩)
        window.startGame = async () => {
            console.log("🎮 게임 시작 버튼 클릭됨");
            console.log("현재 activeUsersData:", activeUsersData);
            
            if(activeUsersData.length < 3) return alert("최소 3명 이상의 학생이 필요합니다!");
            if(!confirm("게임을 시작하시겠습니까?")) return;

            // 최신 데이터를 다시 가져오기
            const snapshot = await getDocs(collection(db, "active_users"));
            const latestUsers = [];
            snapshot.forEach((doc) => {
                latestUsers.push({ id: doc.id, ...doc.data() });
            });
            
            console.log("최신 사용자 데이터:", latestUsers);
            
            const waitingUsers = latestUsers.filter(user => user.status === "waiting");
            console.log("대기 중인 사용자:", waitingUsers);
            
            if(waitingUsers.length < 3) return alert(`대기 중인 학생이 ${waitingUsers.length}명입니다. 최소 3명이 필요합니다!`);

            let students = waitingUsers.map(user => user.name);
            
            // 학생들을 랜덤으로 섞기
            let shuffled = [...students].sort(() => Math.random() - 0.5);
            
            // 학생 수에 따라 최대 단계 결정:
            // 3명 = 4단계 (1:players[0]그림, 2:players[1]추측, 3:players[1]그림, 4:players[2]추측)
            // 4명 이상 = 6단계 (1:players[0]그림, 2:players[1]추측, 3:players[1]그림, 4:players[2]추측, 5:players[2]그림, 6:players[3]추측)
            let max_step = shuffled.length >= 4 ? 6 : 4;
            
            // 💡 [수정] 입력창에서 제시어 풀 가져오기
            const currentPool = getSelectedTopics();
            
            const batch = writeBatch(db);

            // 학생 수만큼 팀 생성 (라운드 로빈 방식)
            // 각 학생이 1번, 2번, 3번, 4번을 정확히 한 번씩 맡음
            for (let i = 0; i < shuffled.length; i++) {
                let player1 = shuffled[i];
                let player2 = shuffled[(i + 1) % shuffled.length];
                let player3 = shuffled[(i + 2) % shuffled.length];
                let player4 = shuffled[(i + 3) % shuffled.length];

                const teamRef = doc(collection(db, "relays")); 
                batch.set(teamRef, {
                    players: [player1, player2, player3, player4], 
                    topic: currentPool[Math.floor(Math.random() * currentPool.length)],
                    current_step: 1, 
                    max_step: max_step, // 최대 단계 저장
                    hints_used: 0,
                    turn_data: { draw1: "", guess1: "", draw2: "", guess2: "", draw3: "", guess3: "" },
                    final_score: null 
                });
            }

            // 모든 대기 중인 사용자의 상태를 "playing"으로 변경
            waitingUsers.forEach(user => {
                batch.update(doc(db, "active_users", user.id), { status: "playing" });
            });

            await batch.commit(); 
            console.log("✅ 게임 시작 완료!");
            
            // ✅ game_state 문서 생성 (단계별 타이머 자동 진행)
            let currentStep = 1;
            
            // 단계별 타이머 함수 (짝수: 30초, 홀수: 60초)
            async function runStepTimer(step, maxStep) {
                let duration = (step % 2 === 0) ? 30000 : 60000; // 짝수는 30초, 홀수는 60초
                
                // 💡 game_state 파이어베이스 문서에 current_round 변수도 함께 저장하여 학생에게 전송합니다.
                await setDoc(doc(db, "game_state", "current"), {
                    status: "playing",
                    current_step: step,
                    max_step: maxStep,
                    current_round: currentRoundCount // 💡 [추가] 현재 라운드 차수 주입
                });

                if (step < maxStep) {
                    setTimeout(() => runStepTimer(step + 1, maxStep), duration);
                } else {
                    setTimeout(async () => {
                        // 게임이 끝났을 때도 라운드 유지 정보 전송
                        await setDoc(doc(db, "game_state", "current"), { 
                            status: "finished",
                            current_round: currentRoundCount 
                        });
                    }, duration);
                }
            }
            
            runStepTimer(currentStep, max_step);
            alert(`게임이 시작되었습니다!\n\n${max_step}단계까지 진행됩니다.\n- 홀수 단계(그리기): 60초\n- 짝수 단계(추측): 30초`);
        };

        // 🔄 [새로운 기능] 로그아웃 없는 연속 재시작 함수
        window.restartGame = async () => {
            if(activeUsersData.length < 3) return alert("최소 3명 이상의 학생이 필요합니다!");
            if(!confirm("이전 게임 기록을 정리하고 현재 인원 그대로 다음 판을 시작하시겠습니까?\n(학생들의 로그인은 유지됩니다)")) return;

            try {
                // 💡 [핵심 해결책] 라운드 카운터를 1 증가시키고 화면의 텍스트를 즉시 변경합니다.
                currentRoundCount++;
                document.getElementById('round-display').innerText = `🎮 제 ${currentRoundCount}라운드 진행 중`;

                const batch = writeBatch(db);

                // 1. 이전 판의 릴레이 기록만 컬렉션에서 모두 삭제
                const relaysSnapshot = await getDocs(collection(db, "relays"));
                relaysSnapshot.forEach((docSnap) => {
                    batch.delete(doc(db, "relays", docSnap.id));
                });

                // 2. 현재 접속 중인 모든 사용자 상태를 다시 "playing"으로 통일
                activeUsersData.forEach(user => {
                    batch.update(doc(db, "active_users", user.id), { status: "playing" });
                });
                await batch.commit();

                // 3. 현재 접속 및 플레이 중인 학생 명단 추출 후 랜덤 셔플
                let students = activeUsersData.map(user => user.name);
                let shuffled = [...students].sort(() => Math.random() - 0.5);
                let max_step = shuffled.length >= 4 ? 6 : 4;

                // 💡 [수정] 입력창에서 제시어 풀 가져오기
                const currentPoolRestart = getSelectedTopics();

                const newGameBatch = writeBatch(db);
                // 라운드 로빈 방식으로 신규 팀 및 랜덤 주제어 배정
                for (let i = 0; i < shuffled.length; i++) {
                    let player1 = shuffled[i];
                    let player2 = shuffled[(i + 1) % shuffled.length];
                    let player3 = shuffled[(i + 2) % shuffled.length];
                    let player4 = shuffled[(i + 3) % shuffled.length];

                    const teamRef = doc(collection(db, "relays")); 
                    newGameBatch.set(teamRef, {
                        players: [player1, player2, player3, player4], 
                        topic: currentPoolRestart[Math.floor(Math.random() * currentPoolRestart.length)],
                        current_step: 1, 
                        max_step: max_step,
                        hints_used: 0,
                        turn_data: { draw1: "", guess1: "", draw2: "", guess2: "", draw3: "", guess3: "" },
                        final_score: null 
                    });
                }
                await newGameBatch.commit();

                // 4. 교사용 결과 뷰 초기화 및 화면 전환
                document.getElementById('results-view').innerHTML = '';
                document.getElementById('results-view').style.display = 'none';
                document.getElementById('student-list').style.display = 'grid';

                // 5. 단계별 자동 타이머 루프 구동 (1단계부터 다시 시작)
                let currentStep = 1;
                async function runStepTimer(step, maxStep) {
                    let duration = (step % 2 === 0) ? 30000 : 60000;
                    
                    // 💡 game_state 파이어베이스 문서에 current_round 변수도 함께 저장하여 학생에게 전송합니다.
                    await setDoc(doc(db, "game_state", "current"), {
                        status: "playing",
                        current_step: step,
                        max_step: maxStep,
                        current_round: currentRoundCount // 💡 [추가] 현재 라운드 차수 주입
                    });

                    if (step < maxStep) {
                        setTimeout(() => runStepTimer(step + 1, maxStep), duration);
                    } else {
                        setTimeout(async () => {
                            // 게임이 끝났을 때도 라운드 유지 정보 전송
                            await setDoc(doc(db, "game_state", "current"), { 
                                status: "finished",
                                current_round: currentRoundCount 
                            });
                        }, duration);
                    }
                }
                
                runStepTimer(currentStep, max_step);
                alert("🔄 새로운 라운드가 시작되었습니다! 학생 화면이 자동으로 전환됩니다.");

            } catch (e) {
                console.error("재시작 루프 오류:", e);
                alert("게임 재시작 중 오류가 발생했습니다.");
            }
        };

        // 팀 카드 렌더링 로직을 함수로 분리 (유지보수 용이)
        function renderTeamCard(team, container, rank) {
            const teamId = team.id;
            const maxStep = team.max_step || 6;
            
            const turnData = team.turn_data || {};
            const draw1 = turnData.draw1 || "";
            const guess1 = turnData.guess1 || "대기 중...";
            const draw2 = turnData.draw2 || "";
            const guess2 = turnData.guess2 || "대기 중...";
            const draw3 = turnData.draw3 || "";
            const guess3 = turnData.guess3 || "대기 중...";
            
            let statusBadge = team.current_step === maxStep + 1 ? '✅ 완료' : `🏃 진행중 (현재 ${team.current_step}단계)`;
            let expectedScore = Math.max(0, 50 - (team.hints_used * 10));
            let scoreText = team.final_score !== null ? `확정 점수: ${team.final_score}점` : `예상 점수: ${expectedScore}점 (힌트 ${team.hints_used}회 사용)`;

            // 💡 [레이아웃 개역] 추측 카드가 하단에 따로 분리되지 않고, 다음 그림 박스의 상단으로 결합됩니다.
            let stepsHTML = '';
            stepsHTML += `
                <div class="step-box">
                    <div class="step-title">1. 원래 제시어</div>
                    <div class="step-content-large" style="color:#4a90e2;">🎯 ${team.topic}</div>
                </div>
                <div class="step-box">
                    <div class="step-title">2. ${team.players[0]}의 그림</div>
                    <div style="margin-top:auto;">
                        ${draw1 ? `<img src="${draw1}" onclick="window.openImageModal('${draw1}')">` : '아직 그리는 중...'}
                    </div>
                </div>
                <div class="step-box">
                    <div class="step-title">3~4. ${team.players[1]}의 추측 및 그림</div>
                    <div class="step-content-small">✏️ 추측: ${guess1}</div>
                    <div style="margin-top:auto;">
                        ${draw2 ? `<img src="${draw2}" onclick="window.openImageModal('${draw2}')">` : '아직 그리는 중...'}
                    </div>
                </div>
            `;
            
            if(maxStep >= 6) {
                stepsHTML += `
                    <div class="step-box">
                        <div class="step-title">5~6. ${team.players[2]}의 추측 및 그림</div>
                        <div class="step-content-small">✏️ 추측: ${guess2}</div>
                        <div style="margin-top:auto;">
                            ${draw3 ? `<img src="${draw3}" onclick="window.openImageModal('${draw3}')">` : '아직 그리는 중...'}
                        </div>
                    </div>
                    <div class="step-box" id="final-box-${teamId}">
                        <div class="step-title">7. ${team.players[3]}의 최종 정답</div>
                        <button class="btn-reveal" id="reveal-btn-${teamId}" onclick="window.revealFinalGuess('${teamId}')">👁️ 정답 확인</button>
                        <div class="step-content-large secret-guess" id="final-guess-${teamId}">🏁 ${guess3}</div>
                    </div>
                `;
            }

            container.innerHTML += `
                <div class="result-card" id="card-${teamId}">
                    <div class="result-header">
                        🏆 ${rank}위 팀 | 순서: ${team.players.join(' ➔ ')}
                        <div style="float: right; color: ${team.final_score !== null ? '#2ecc71' : '#e67e22'}">${statusBadge} | ${scoreText}</div>
                    </div>
                    
                    <div class="relay-flow">
                        ${stepsHTML}
                    </div>

                    ${team.current_step === maxStep + 1 && team.final_score === null ? `
                    <div class="action-buttons" id="actions-${teamId}">
                        <span>📢 최종 정답이 원래 제시어와 일치하나요?</span>
                        <button class="btn-correct" onclick="gradeTeam('${teamId}', ${team.hints_used})">⭕ 정답 인정! (${expectedScore}점)</button>
                        <button class="btn-wrong" onclick="gradeTeam('${teamId}', 999)">❌ 오답 처리 (0점)</button>
                    </div>
                    ` : ''}
                </div>
            `;
        }

        // 💡 [추가] 최종 정답을 클릭 시 블러를 해제하고 띄워주는 글로벌 함수
        window.revealFinalGuess = (teamId) => {
            const guessEl = document.getElementById(`final-guess-${teamId}`);
            const btnEl = document.getElementById(`reveal-btn-${teamId}`);
            if (guessEl && btnEl) {
                guessEl.classList.add('revealed');
                btnEl.style.display = 'none'; // 확인 후 버튼 숨김
            }
        };

        // ② <script> 태그 안쪽 맨 아래에 모달 제어 함수 2개를 추가합니다.
        window.openImageModal = (src) => {
            const modal = document.getElementById('picture-modal');
            const modalImg = document.getElementById('modal-target-img');
            if (modal && modalImg) {
                modalImg.src = src;
                modal.style.display = 'flex'; // 화면 중앙 정렬 구동
            }
        };

        window.closeImageModal = () => {
            const modal = document.getElementById('picture-modal');
            if (modal) {
                modal.style.display = 'none';
            }
        };

        // [3] 결과 확인 및 화면 렌더링
        window.showResults = async () => {
            document.getElementById('student-list').style.display = 'none';
            const resultsView = document.getElementById('results-view');
            resultsView.style.display = 'block';
            resultsView.innerHTML = '<h2 style="text-align:center;">데이터를 불러오는 중입니다...</h2>';

            const querySnapshot = await getDocs(collection(db, "relays"));
            let teams = [];
            querySnapshot.forEach(docSnap => teams.push({ id: docSnap.id, ...docSnap.data() }));

            if(teams.length === 0) {
                resultsView.innerHTML = '<h2 style="text-align:center;">아직 진행된 게임이 없습니다.</h2>';
                return;
            }

            // 1. 채점이 필요한 팀과 완료된 팀 분리
            const pendingTeams = teams.filter(t => t.final_score === null);
            const completedTeams = teams.filter(t => t.final_score !== null);

            // 2. 완료된 팀만 점수 순 정렬 (높은 순)
            completedTeams.sort((a, b) => (b.final_score || 0) - (a.final_score || 0));

            resultsView.innerHTML = `<h2 style="text-align:center;">🏆 최종 순위표</h2>`;

            // 3. 채점 대기 중인 팀 섹션 (상단에 우선 배치)
            if (pendingTeams.length > 0) {
                resultsView.innerHTML += `<h3 style="color:#e67e22;">🚨 채점이 필요한 팀 (${pendingTeams.length}팀)</h3>`;
                pendingTeams.forEach((team, index) => renderTeamCard(team, resultsView, index + 1));
            }

            // 4. 완료된 팀 섹션
            if (completedTeams.length > 0) {
                resultsView.innerHTML += `<h3 style="color:#2ecc71;">✅ 채점 완료된 팀</h3>`;
                completedTeams.forEach((team, index) => renderTeamCard(team, resultsView, index + 1));
            }

            // 5. 개인 순위표 추가
            try {
                const scoreSnapshot = await getDocs(collection(db, "user_scores"));
                let userScores = [];
                scoreSnapshot.forEach(docSnap => userScores.push(docSnap.data()));

                userScores.sort((a, b) => b.score - a.score);

                if (userScores.length > 0) {
                    let scoreHTML = `
                        <div class="result-card" style="margin-top: 50px; background: #fffdf0; border: 2px solid #f1c40f;">
                            <div class="result-header" style="color: #d35400;">🏆 우리반 개인 점수 명예의 전당</div>
                            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px;">
                    `;
                    
                    userScores.forEach((user, idx) => {
                        scoreHTML += `
                            <div class="step-box" style="border: 2px solid #f1c40f; background: white;">
                                <div class="step-title" style="font-size:1.2em; color:#e67e22;">🥇 ${idx + 1}위</div>
                                <div class="step-content" style="font-size:1.8em;">${user.name}</div>
                                <div style="font-size:1.3em; font-weight:bold; color:#7f8c8d; margin-top:5px;">${user.score}점</div>
                            </div>
                        `;
                    });
                    
                    scoreHTML += `</div></div>`;
                    resultsView.innerHTML += scoreHTML;
                }
            } catch (e) {
                console.error("개인 순위 로드 실패:", e);
            }
        };

        // [4] 채점 로직 (점수 자동 계산 + 개인 점수 합산)
        window.gradeTeam = async (teamId, hintsUsed) => {
            const baseScore = 50;
            const hintPenalty = (hintsUsed || 0) * 10;
            const finalCalculatedScore = Math.max(0, baseScore - hintPenalty);

            if(confirm(`힌트 ${hintsUsed || 0}회 사용으로, 최종 점수는 ${finalCalculatedScore}점입니다. 확정하시겠습니까?`)) {
                try {
                    const teamRef = doc(db, "relays", teamId);
                    await updateDoc(teamRef, { final_score: finalCalculatedScore });
                    
                    // 팀원 개인 점수 합산
                    const teamSnap = await getDoc(teamRef);
                    if (teamSnap.exists()) {
                        const teamData = teamSnap.data();
                        const batch = writeBatch(db);
                        teamData.players.forEach(playerName => {
                            const userScoreRef = doc(db, "user_scores", playerName);
                            batch.set(userScoreRef, { 
                                name: playerName, 
                                score: increment(finalCalculatedScore) 
                            }, { merge: true });
                        });
                        await batch.commit();
                    }

                    alert("점수 및 개인별 누적 점수가 확정되었습니다!");
                    showResults(); 
                } catch(e) {
                    console.error(e);
                    alert("오류가 발생했습니다.");
                }
            }
        };

        // 비밀번호 확인
        window.checkPassword = () => {
            const password = document.getElementById('password-input').value;
            if(password === "1004") {
                document.getElementById('password-screen').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';
            } else {
                alert("비밀번호가 틀렸습니다!");
                document.getElementById('password-input').value = '';
            }
        };

        // Enter 키로 비밀번호 입력
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('password-input').addEventListener('keypress', (e) => {
                if(e.key === 'Enter') {
                    checkPassword();
                }
            });
        });
    </script>
</body>
</html>
