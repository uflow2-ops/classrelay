<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리반 그림 릴레이</title>
    <style>
        :root {
            --main-bg: #eef4ff;
            --card-bg: rgba(255, 255, 255, 0.96);
            --primary: #3b82f6;
            --secondary: #10b981;
            --accent: #f59e0b;
            --text: #1f2937;
            --muted: #475569;
            --border: rgba(59, 130, 246, 0.16);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: '맑은 고딕', sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 24px 16px 40px;
            color: var(--text);
            background: linear-gradient(180deg, #dbeafe 0%, #eff6ff 45%, #f8fafc 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1, h2, h3 {
            margin: 0;
            color: var(--text);
            letter-spacing: -0.03em;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.2rem, 5vw, 2.8rem);
            margin-bottom: 16px;
        }

        h2 {
            font-size: clamp(1.5rem, 3vw, 2rem);
            margin-bottom: 10px;
        }

        h3 {
            font-size: 1.3rem;
        }

        #waiting-ui,
        #game-ui,
        #guess-ui {
            display: none;
        }

        #login-ui {
            display: block;
        }

        #login-ui,
        #waiting-ui,
        #game-ui,
        #guess-ui {
            width: min(100%, 940px);
            max-width: 100%;
            margin: 0 auto;
            padding: 28px 26px;
            border-radius: 32px;
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 22px 60px rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.12);
        }

        .page-header {
            text-align: center;
            margin-bottom: 24px;
            padding: 0 8px;
        }

        .btn-primary,
        .btn-secondary,
        .toolbar button,
        .btn-hint {
            border: none;
            border-radius: 999px;
            font-weight: 800;
            transition: transform 0.25s ease, box-shadow 0.25s ease, opacity 0.25s ease;
            cursor: pointer;
            box-shadow: 0 14px 35px rgba(59, 130, 246, 0.18);
        }

        .btn-primary {
            padding: 15px 32px;
            font-size: 18px;
            background: linear-gradient(135deg, #2563eb, #3b82f6);
            color: white;
        }

        .btn-secondary {
            padding: 14px 28px;
            font-size: 16px;
            background: #f8fafc;
            color: var(--text);
            box-shadow: 0 12px 26px rgba(15, 23, 42, 0.08);
        }

        .btn-primary:hover,
        .btn-secondary:hover,
        .btn-hint:hover,
        .toolbar button:hover {
            transform: translateY(-2px);
        }

        .btn-hint {
            padding: 12px 22px;
            font-size: 16px;
            color: #1f2937;
            background: #fbbf24;
            box-shadow: 0 14px 28px rgba(251, 191, 36, 0.28);
            display: none;
        }

        #login-ui {
            margin-top: 20px;
            text-align: center;
        }

        #wait-content {
            display: grid;
            gap: 18px;
            justify-items: center;
        }

        #student-name {
            width: min(100%, 320px);
            padding: 18px 20px;
            font-size: 18px;
            border: 1px solid rgba(148, 163, 184, 0.45);
            border-radius: 18px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        #student-name:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.12);
        }

        #game-ui,
        #guess-ui {
            position: relative;
            padding-top: 24px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 22px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .toolbar button {
            background: #f8fafc;
            color: #1e293b;
            border: 1px solid rgba(148, 163, 184, 0.3);
            box-shadow: none;
        }

        #drawing-canvas,
        #received-drawing {
            width: 100%;
            max-width: 100%;
            min-height: 420px;
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            background: white;
            box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
        }

        #received-drawing {
            object-fit: contain;
            margin-bottom: 24px;
        }

        #guess-input {
            width: min(100%, 420px);
            padding: 18px 20px;
            font-size: 18px;
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.45);
            outline: none;
            transition: box-shadow 0.2s ease, border-color 0.2s ease;
        }

        #guess-input:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 6px rgba(14, 165, 233, 0.12);
        }

        #hint-display {
            margin-top: 20px;
            border-radius: 20px;
            background: #f8fafc;
            padding: 18px;
            border: 1px dashed rgba(148, 163, 184, 0.45);
            text-align: center;
        }

        #hint-display img {
            max-width: 100%;
            border-radius: 18px;
            border: 1px solid rgba(251, 191, 36, 0.35);
            margin-top: 12px;
        }

        .timer-container {
            width: 100%;
            max-width: 820px;
            margin: 0 auto;
            background: rgba(15, 23, 42, 0.06);
            border-radius: 999px;
            height: 18px;
            overflow: hidden;
        }

        .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #22c55e, #14b8a6);
            border-radius: 999px;
            transition: width 0.8s ease;
        }

        .timer-text {
            font-size: 15px;
            color: var(--muted);
            margin-top: 10px;
        }

        .timer-urgent {
            background: #f97316 !important;
            animation: pulse 0.7s ease-in-out infinite alternate;
        }

        .submitted-badge {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            border-radius: 999px;
            background: rgba(16, 185, 129, 0.12);
            color: #065f46;
            font-size: 1rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
            margin-top: 16px;
        }

        #my-score-box {
            width: min(100%, 360px);
            box-shadow: 0 18px 38px rgba(15, 23, 42, 0.08);
        }

        #waiting-ui {
            text-align: center;
            padding: 40px 30px;
        }

        #waiting-msg-text {
            font-size: 1.15rem;
            color: var(--muted);
            margin-top: 10px;
        }

        @media (max-width: 820px) {
            body {
                padding: 20px 16px 40px;
            }

            .top-bar,
            .toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .toolbar button,
            .btn-primary,
            .btn-secondary,
            .btn-hint {
                width: 100%;
            }

            #guess-input {
                width: 100%;
            }
        }

        @keyframes pulse {
            from { opacity: 1; }
            to { opacity: 0.55; }
        }
    </style>
</head>
<body>

    <!-- 1. 로그인 및 대기 화면 -->
<div id="login-ui">
    <h2>🎨 우리반 그림 릴레이</h2>
    <div id="wait-content">
        <!-- 💡 [추가] 현재 라운드 표시 전광판 -->
        <h3 id="student-round-display" style="color: #3498db; margin-bottom: 5px; display: none;">🎮 제 1라운드 대기 중</h3>
        
        <p>자신의 이름을 입력하고 입장해주세요!</p>
            <input type="text" id="student-name" placeholder="이름을 입력하세요">
            <br>
            <button class="btn-primary" onclick="login()">입장하기</button>
            <br><br>
            
            <!-- 💡 [추가] 학생 누적 점수 표시 박스 (초기에는 숨김) -->
            <div id="my-score-box" style="display:none; margin-top:25px; padding:15px; background:#fffdf0; border:2px dashed #f1c40f; border-radius:10px; max-width:300px; margin-left:auto; margin-right:auto;">
                <span style="font-size:16px; color:#7f8c8d; font-weight:bold;">🏆 나의 현재 누적 점수</span>
                <h1 id="my-accumulated-score" style="margin:5px 0 0 0; color:#d35400;">0점</h1>
            </div>
            
            <br>
            <a href="teacher.html" style="color: #999; font-size: 14px; text-decoration: none;">선생님은 여기로</a>
        </div>
    </div>

    <div id="waiting-ui">
        <h2>⏳ 다음 차례 대기 중입니다</h2>
        <p id="waiting-msg-text">게임이 진행 중입니다. 나의 차례가 되면 자동으로 화면이 전환됩니다.</p>
    </div>

    <!-- 2. 그림 그리기 화면 (홀수 단계: 1, 3, 5) -->
    <div id="game-ui">
        <div class="top-bar">
            <h3 id="welcome-msg" style="margin:0;">그림 릴레이</h3>
            <div>
                <button class="btn-hint" id="hint-btn-draw" onclick="useHint()">💡 힌트보기 (-10점)</button>
            </div>
        </div>
        
        <div class="toolbar">
            <button onclick="setMode('pen')">✏️ 연필</button>
            <button onclick="setMode('eraser')">🧽 지우개</button>
            <button onclick="clearCanvas()">🗑️ 전체 지우기</button>
        </div>
        
        <p style="color:#666; font-size:14px; margin:5px 0;">⏱️ <span id="timer-info">60초가 지나면 자동으로 제출됩니다</span></p>
        <div class="timer-container"><div class="timer-bar"></div></div>
        <p class="timer-text">⏱️ 60초</p>
        <div class="submitted-badge submitted-badge-draw" style="display:none; color:#2ecc71; font-size:18px; font-weight:bold; margin:10px 0;">✅ 제출 완료! 잠시만 기다려주세요...</div>
        <canvas id="drawing-canvas" width="800" height="450"></canvas>
    </div>

    <!-- 3. 정답 맞추기 화면 (짝수 단계: 2, 4, 6) -->
    <div id="guess-ui">
        <div class="top-bar">
            <h3 style="margin:0;">친구가 보낸 그림입니다! 무엇일까요?</h3>
            <div>
                <button class="btn-hint" id="hint-btn-guess" onclick="useHint()">💡 힌트보기 (-10점)</button>
            </div>
        </div>
        <p style="color:#666; font-size:14px; margin:5px 0;">⏱️ <span id="timer-info-guess">30초가 지나면 자동으로 제출됩니다</span></p>
        <div class="timer-container"><div class="timer-bar"></div></div>
        <p class="timer-text">⏱️ 30초</p>
        <div class="submitted-badge submitted-badge-guess" style="display:none; color:#2ecc71; font-size:18px; font-weight:bold; margin:10px 0;">✅ 제출 완료! 잠시만 기다려주세요...</div>
        <img id="received-drawing" src="">
        <br>
        <input type="text" id="guess-input" placeholder="정답을 추측해보세요!">
    </div>

    <!-- 파이어베이스 설정 파일 로드 -->
    <script type="module">
        import { initializeFirebase } from './firebase-config.js';
        import { collection, addDoc, onSnapshot, doc, query, where, updateDoc, increment, deleteDoc, getDocs, writeBatch } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

        const { app, db } = await initializeFirebase();

        let myName = "";
        let myTeamId = ""; 
        let myCurrentStep = 0; 
        let currentTeamData = null; 
        let myDocId = "";
        let isLoggedIn = false;
        
        // ⏱️ 타이머 관련 변수
        let timerInterval = null;
        let TOTAL_TIME = 60;
        let timeLeft = TOTAL_TIME;

        // ⏱️ 타이머 함수
        function startTimer() {
            stopTimer();
            timeLeft = TOTAL_TIME;
            updateTimerDisplay();
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                
                // 💡 [핵심 해결책] 시간이 10초 이하일 때 힌트 버튼 비활성화
                if(timeLeft <= 10) {
                    document.getElementById('hint-btn-draw').disabled = true;
                    document.getElementById('hint-btn-guess').disabled = true;
                    document.getElementById('hint-btn-draw').style.opacity = '0.5';
                    document.getElementById('hint-btn-guess').style.opacity = '0.5';
                }
                
                if(timeLeft <= 0) {
                    stopTimer();
                    autoSubmit();
                }
            }, 1000);
        }
        
        function stopTimer() {
            if(timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }
        
        function updateTimerDisplay() {
            // 그리기 화면과 추측 화면의 타이머 바를 모두 가져옵니다.
            const bars = document.querySelectorAll('.timer-bar');
            const pct = (timeLeft / TOTAL_TIME) * 100;
            
            // 두 화면의 타이머 바를 동시에 줄어들게 만듭니다.
            bars.forEach(bar => {
                bar.style.width = pct + '%';
                if(timeLeft <= 10) {
                    bar.classList.add('timer-urgent');
                } else {
                    bar.classList.remove('timer-urgent');
                }
            });

            // 💡 [핵심 해결책] 두 화면에 존재하는 모든 타이머 텍스트를 찾아 현재 남은 시간을 표시합니다.
            const texts = document.querySelectorAll('.timer-text');
            texts.forEach(text => {
                text.innerText = `⏱️ ${timeLeft}초`;
            });
        }
        
        // ⏱️ 자동 제출 함수
        async function autoSubmit() {
            if(submittedThisRound) return;
            submittedThisRound = true;
            
            // 화면 조작 강제 잠금
            painting = false;
            document.getElementById('drawing-canvas').style.pointerEvents = 'none';
            document.getElementById('guess-input').disabled = true;
            
            if(myCurrentStep % 2 === 1) {
                const dataUrl = canvas.toDataURL();
                const teamRef = doc(db, "relays", myTeamId);
                let updateData = {};
                if(myCurrentStep === 1) updateData = { "turn_data.draw1": dataUrl };
                else if(myCurrentStep === 3) updateData = { "turn_data.draw2": dataUrl };
                else if(myCurrentStep === 5) updateData = { "turn_data.draw3": dataUrl };
                await updateDoc(teamRef, updateData); // 👈 await 추가로 Firestore 업로드 완료 대기
            } else {
                const guess = document.getElementById('guess-input').value || '(시간초과)';
                const teamRef = doc(db, "relays", myTeamId);
                let updateData = {};
                if(myCurrentStep === 2) updateData = { "turn_data.guess1": guess };
                else if(myCurrentStep === 4) updateData = { "turn_data.guess2": guess };
                else if(myCurrentStep === 6) updateData = { "turn_data.guess3": guess };
                await updateDoc(teamRef, updateData); // 👈 await 추가
            }
            
            document.querySelectorAll('.submitted-badge').forEach(el => el.style.display = 'block');
        }

        // ✅ 전역 game_state 감시
        let globalStep = 0;
        let globalMaxStep = 6;
        let submittedThisRound = false;
        let teamUnsubscribe = null;
        
        let lastRenderedStep = 0; // 💡 [추가된 변수] 내가 마지막으로 화면에 그린 단계를 기억합니다.

        // 내가 속한 팀 찾기 + 해당 단계 UI 표시
        function findMyTeamAndShow(currentStep, maxStep) {
            if(teamUnsubscribe) {
                teamUnsubscribe();
                teamUnsubscribe = null;
            }
            
            const q = query(collection(db, "relays"), where("players", "array-contains", myName));
            
            teamUnsubscribe = onSnapshot(q, (snapshot) => {
                let found = false;
                snapshot.forEach((docSnap) => {
                    const teamData = docSnap.data();
                    
                    let expectedPlayer;
                    if (currentStep === 1) expectedPlayer = teamData.players[0];
                    else if (currentStep === 2) expectedPlayer = teamData.players[1];
                    else if (currentStep === 3) expectedPlayer = teamData.players[1];
                    else if (currentStep === 4) expectedPlayer = teamData.players[2];
                    else if (currentStep === 5) expectedPlayer = teamData.players[2];
                    else if (currentStep === 6) expectedPlayer = teamData.players[3];
                    
                    if(expectedPlayer === myName) {
                        found = true;
                        
                        if(submittedThisRound) {
                            return;
                        }
                        
                        currentTeamData = teamData;
                        myTeamId = docSnap.id;
                        myCurrentStep = currentStep;
                        
                        // 이번 단계를 이미 화면에 그렸다면, 특별한 데이터 변경이 없으면 재표시를 막습니다.
                        if (lastRenderedStep === currentStep) {
                            const noMoreDataNeeded = currentStep === 1 || currentStep === 3 || currentStep === 5;
                            if (noMoreDataNeeded) {
                                return;
                            }
                        }

                        document.querySelectorAll('.submitted-badge').forEach(el => el.style.display = 'none');
                        
                        TOTAL_TIME = (currentStep % 2 === 0) ? 30 : 60;
                        document.querySelectorAll('.timer-text').forEach(el => el.innerText = `⏱️ ${TOTAL_TIME}초`);
                        document.getElementById('timer-info').innerText = TOTAL_TIME === 30 ? '30초가 지나면 자동으로 제출됩니다' : '60초가 지나면 자동으로 제출됩니다';
                        document.getElementById('timer-info-guess').innerText = '30초가 지나면 자동으로 제출됩니다';
                        
                        const hintBtnDraw = document.getElementById('hint-btn-draw');
                        const hintBtnGuess = document.getElementById('hint-btn-guess');
                        if (hintBtnDraw) hintBtnDraw.style.display = (currentStep === 3 || currentStep === 5) ? 'inline-block' : 'none';
                        if (hintBtnGuess) hintBtnGuess.style.display = (currentStep === 6) ? 'inline-block' : 'none';
                        // 💡 [핵심 해결책] 힌트 버튼 활성화 상태 초기화
                        if (hintBtnDraw) {
                            hintBtnDraw.disabled = false;
                            hintBtnDraw.style.opacity = '1';
                        }
                        if (hintBtnGuess) {
                            hintBtnGuess.disabled = false;
                            hintBtnGuess.style.opacity = '1';
                        }
                        
                        const hintDisplay = document.getElementById('hint-display');
                        if (hintDisplay) hintDisplay.style.display = 'none';
                        
                        let renderedNow = false;
                        if(currentStep === 1) {
                            document.getElementById('welcome-msg').innerText = `🎯 제시어: ${teamData.topic}`;
                            if (hintDisplay) hintDisplay.style.display = 'none';
                            const hintBtnDraw = document.getElementById('hint-btn-draw');
                            if (hintBtnDraw) hintBtnDraw.style.display = 'none';
                            showDrawUI();
                            renderedNow = true;
                        } else if(currentStep === 2) {
                            // 💡 draw1 데이터가 아직 파이어베이스에서 도달하지 않았다면 도착할 때까지 기다립니다.
                            if (!teamData.turn_data || !teamData.turn_data.draw1) {
                                console.log("⏳ 1번 학생의 그림 데이터를 불러오는 중입니다...");
                                return; 
                            }
                            document.getElementById('received-drawing').src = teamData.turn_data.draw1;
                            showGuessUI();
                            renderedNow = true;
                        } else if(currentStep === 3) {
                            const myPreviousGuess = teamData.turn_data.guess1 || "(미입력)";
                            document.getElementById('welcome-msg').innerText = `🎨 제시어: [ ${myPreviousGuess} ] - 그림으로 표현해주세요!`;
                            if (hintDisplay) hintDisplay.style.display = 'none';
                            showDrawUI();
                            renderedNow = true;
                        } else if(currentStep === 4) {
                            if (!teamData.turn_data || !teamData.turn_data.draw2) {
                                console.log("⏳ 2번 학생의 그림 데이터를 불러오는 중입니다...");
                                return; 
                            }
                            document.getElementById('received-drawing').src = teamData.turn_data.draw2;
                            showGuessUI();
                            renderedNow = true;
                        } else if(currentStep === 5) {
                            const myPreviousGuess = teamData.turn_data.guess2 || "(미입력)";
                            document.getElementById('welcome-msg').innerText = `🎨 제시어: [ ${myPreviousGuess} ] - 그림으로 표현해주세요!`;
                            if (hintDisplay) hintDisplay.style.display = 'none';
                            showDrawUI();
                            renderedNow = true;
                        } else if(currentStep === 6) {
                            if (!teamData.turn_data || !teamData.turn_data.draw3) {
                                console.log("⏳ 3번 학생의 그림 데이터를 불러오는 중입니다...");
                                return; 
                            }
                            document.getElementById('received-drawing').src = teamData.turn_data.draw3;
                            showGuessUI();
                            renderedNow = true;
                        } else if(currentStep > maxStep) {
                            showWaitUI("🎉 모든 릴레이가 끝났습니다! 선생님의 화면을 보세요 🎉");
                        }

                        if (renderedNow) {
                            lastRenderedStep = currentStep;
                        }
                    }
                });
                
                if(!found && currentStep <= maxStep) {
                    showWaitUI(`⏳ ${currentStep}단계는 내 차례가 아닙니다. 잠시만 기다려주세요...`);
                    lastRenderedStep = 0; // 💡 대기 상태일 때는 다음 턴을 위해 초기화해줍니다.
                }
            });
        }

        function listenToGameState() {
            onSnapshot(doc(db, "game_state", "current"), (snapshot) => {
                if(!snapshot.exists()) return;
                const state = snapshot.data();
                
                // 💡 [추가] 교사가 저장한 현재 라운드 번호를 가져와 대기 화면에 표시합니다.
                const roundDisplay = document.getElementById('student-round-display');
                if (state.current_round) {
                    roundDisplay.innerText = `🎮 제 ${state.current_round}라운드 대기 중`;
                    roundDisplay.style.display = 'block';
                }

                // 💡 [핵심 해결책 1] 게임이 종료되었을 때, 마지막 단계(6단계)를 강제 제출
                if(state.status === "finished") {
                    if (!submittedThisRound && globalStep > 0) {
                        console.log("게임 종료! 마지막 정답 강제 제출");
                        autoSubmit(); 
                    }
                    showWaitUI("🎉 게임이 종료되었습니다! 선생님의 화면을 확인하세요.");
                    return;
                }

                if(state.status !== "playing") {
                    showWaitUI("⏳ 게임이 아직 시작되지 않았습니다...");
                    return;
                }
                
                // 💡 [핵심 해결책 2] 선생님이 다음 단계를 지시했는데, 아직 내 타이머가 안 끝나서 제출을 못했다면?
                // ➔ 화면을 지우기 전에 지금 있는 그림/글씨를 즉시 강제 제출!
                if (globalStep > 0 && globalStep !== state.current_step && !submittedThisRound) {
                    console.log("시간 초과 컷오프! 강제 제출 실행");
                    autoSubmit(); 
                }
                
                // 전역 변수 업데이트 및 UI 초기화
                globalStep = state.current_step;
                globalMaxStep = state.max_step || 6;
                
                // 다음 단계를 위해 제출 상태 초기화
                submittedThisRound = false; 
                document.querySelectorAll('.submitted-badge').forEach(el => el.style.display = 'none');
                
                // 학생의 팀 정보 재조회 및 화면 표시
                findMyTeamAndShow(globalStep, globalMaxStep);
            });
        }

        // 💡 [추가] 내 누적 점수를 실시간으로 감시하는 함수
        let scoreUnsubscribe = null;
        let currentDisplayScore = 0; // 💡 현재 화면에 표시 중인 점수를 기억하는 변수

        function trackMyScore() {
            if (scoreUnsubscribe) scoreUnsubscribe();
            
            scoreUnsubscribe = onSnapshot(doc(db, "user_scores", myName), (docSnap) => {
                const scoreBox = document.getElementById('my-score-box');
                const scoreText = document.getElementById('my-accumulated-score');
                
                if (docSnap.exists()) {
                    const userData = docSnap.data();
                    const targetScore = userData.score || 0; // 도달해야 하는 실제 점수
                    
                    // 💡 [핵심 애니메이션 로직]
                    const startScore = currentDisplayScore;
                    const duration = 1000; // 애니메이션 지속 시간 (1초 = 1000ms)
                    let startTime = null;
                    
                    function animateCount(timestamp) {
                        if (!startTime) startTime = timestamp;
                        const progress = timestamp - startTime;
                        
                        // 진행도 계산 (0에서 1 사이)
                        const rate = Math.min(progress / duration, 1);
                        
                        // 3학년 아이들의 시각적 부드러움을 위해 Ease-Out 효과 적용 (점점 느려짐)
                        const easeOutRate = 1 - Math.pow(1 - rate, 3);
                        
                        // 현재 프레임의 점수 계산 및 출력
                        currentDisplayScore = Math.floor(startScore + (targetScore - startScore) * easeOutRate);
                        scoreText.innerText = `${currentDisplayScore}점`;
                        
                        // 목표 점수에 도달할 때까지 반복 수행
                        if (rate < 1) {
                            requestAnimationFrame(animateCount);
                        } else {
                            currentDisplayScore = targetScore;
                            scoreText.innerText = `${targetScore}점`;
                        }
                    }
                    
                    // 애니메이션 시작 구동
                    requestAnimationFrame(animateCount);
                    
                } else {
                    currentDisplayScore = 0;
                    scoreText.innerText = `0점`;
                }
                scoreBox.style.display = 'block'; 
            });
        }

        // [1. 로그인]
        window.login = async () => {
            const nameInput = document.getElementById('student-name').value;
            if (!nameInput) return alert("이름을 입력하세요!");
            myName = nameInput.trim();

            try {
                console.log("🔑 로그인 시도:", myName);
                
                const existingUsers = await getDocs(query(collection(db, "active_users"), where("name", "==", myName)));
                console.log("기존 접속 기록:", existingUsers.size, "개");
                const batch = writeBatch(db);
                existingUsers.forEach((docSnap) => {
                    batch.delete(doc(db, "active_users", docSnap.id));
                });
                await batch.commit();

                const docRef = await addDoc(collection(db, "active_users"), { name: myName, status: "waiting" });
                console.log("✅ 접속 기록 생성 완료:", docRef.id);
                myDocId = docRef.id;

                isLoggedIn = true;
            showWaitUI(`${myName}님, 선생님이 게임을 시작할 때까지 기다려주세요! 🤫`);
                
                // 💡 [추가] 실시간 누적 점수 추적 시작
                trackMyScore();
                
                listenToGameState();
            } catch (e) { 
                console.error("❌ 접속 실패:", e);
                alert("접속 실패! " + e.message); 
            }
        };

        // ⭐️ [브라우저 창을 닫을 때 자동으로 데이터 지우기]
        window.addEventListener("beforeunload", () => {
            if (myDocId) {
                deleteDoc(doc(db, "active_users", myDocId));
            }
        });

        // [3. 힌트 사용]
        window.useHint = async () => {
            // 💡 [핵심 해결책] 시간이 10초 이하이면 힌트 사용 차단
            if(timeLeft <= 10) {
                alert("⏰ 남은 시간이 10초 이하입니다. 힌트를 사용할 수 없습니다!");
                return;
            }
            
            if(confirm("💡 힌트를 보면 우리 팀 점수가 10점 깎입니다! 정말 보시겠습니까?")) {
                const teamRef = doc(db, "relays", myTeamId);
                await updateDoc(teamRef, { hints_used: increment(1) });

                if(myCurrentStep === 3 || myCurrentStep === 5) {
                    const hintDiv = document.getElementById('hint-display');
                    hintDiv.innerHTML = `<p style="margin:5px; font-weight:bold; color:red;">🚨 1번 친구의 원본 그림입니다!</p><img src="${currentTeamData.turn_data.draw1}">`;
                    hintDiv.style.display = 'block';
                    document.getElementById('hint-btn-draw').style.display = 'none'; 
                } else if (myCurrentStep === 6) {
                    alert(`🚨 가장 처음 제시된 주제어는 [ ${currentTeamData.topic} ] 입니다!`);
                    document.getElementById('hint-btn-guess').style.display = 'none'; 
                }
            }
        };

        // UI 표시 함수들
        function showWaitUI(msg) {
            stopTimer();
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('guess-ui').style.display = 'none';
            document.getElementById('waiting-ui').style.display = 'none';
            document.getElementById('login-ui').style.display = 'none';

            const scoreBox = document.getElementById('my-score-box');
            const waitingUi = document.getElementById('waiting-ui');
            const loginUi = document.getElementById('login-ui');
            const waitContent = document.getElementById('wait-content');

            if (isLoggedIn) {
                waitingUi.style.display = 'block';
                if (scoreBox) scoreBox.style.display = 'block';
                document.getElementById('waiting-msg-text').innerText = msg;
            } else {
                loginUi.style.display = 'block';
                if (scoreBox) scoreBox.style.display = 'none';

                const inputName = document.getElementById('student-name');
                const loginBtn = waitContent.querySelector('.btn-primary');
                if (inputName) inputName.style.display = 'block';
                if (loginBtn) loginBtn.style.display = 'inline-block';

                let msgP = document.getElementById('wait-msg-text');
                if (!msgP) {
                    msgP = document.createElement('p');
                    msgP.id = 'wait-msg-text';
                    waitContent.insertBefore(msgP, scoreBox);
                }
                msgP.innerText = msg;
            }
        }
        function showDrawUI() { stopTimer(); document.getElementById('login-ui').style.display = 'none'; document.getElementById('waiting-ui').style.display = 'none'; document.getElementById('guess-ui').style.display = 'none'; document.getElementById('game-ui').style.display = 'block'; document.getElementById('drawing-canvas').style.pointerEvents = 'auto'; clearCanvas(); initCanvas(); startTimer(); }
        function showGuessUI() { stopTimer(); document.getElementById('login-ui').style.display = 'none'; document.getElementById('waiting-ui').style.display = 'none'; document.getElementById('game-ui').style.display = 'none'; document.getElementById('guess-ui').style.display = 'block'; document.getElementById('guess-input').disabled = false; document.getElementById('guess-input').value = ""; document.querySelectorAll('.submitted-badge').forEach(el => el.style.display = 'none'); startTimer(); }

        // 캔버스 세팅
        const canvas = document.getElementById('drawing-canvas');
        const ctx = canvas.getContext('2d');
        let painting = false;
        let canvasInitialized = false;

        function initCanvas() {
            if (canvasInitialized) return;
            canvasInitialized = true;

            ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.strokeStyle = 'black';
            canvas.addEventListener('mousedown', (e) => { painting = true; draw(e); });
            canvas.addEventListener('mouseup', () => { painting = false; ctx.beginPath(); });
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseleave', () => { painting = false; ctx.beginPath(); });
            canvas.addEventListener('touchstart', (e) => { e.preventDefault(); painting = true; const touch = e.touches[0]; const mouseEvent = new MouseEvent("mousedown", { clientX: touch.clientX, clientY: touch.clientY }); canvas.dispatchEvent(mouseEvent); }, { passive: false });
            canvas.addEventListener('touchend', (e) => { e.preventDefault(); painting = false; ctx.beginPath(); }, { passive: false });
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const touch = e.touches[0]; const mouseEvent = new MouseEvent("mousemove", { clientX: touch.clientX, clientY: touch.clientY }); canvas.dispatchEvent(mouseEvent); }, { passive: false });
        }

        function draw(e) {
            if (!painting) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left; const y = e.clientY - rect.top;
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
        }

        window.setMode = (mode) => { ctx.strokeStyle = (mode === 'eraser') ? 'white' : 'black'; ctx.lineWidth = (mode === 'eraser') ? 20 : 5; };
        window.clearCanvas = () => { ctx.clearRect(0, 0, canvas.width, canvas.height); };
    </script>
</body>
</html>
